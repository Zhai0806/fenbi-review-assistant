# 粉笔网请求配置
fenbi:
  # 从浏览器复制的完整 Cookie 字符串（注意保持原样，不要有换行）
  cookie: "你的粉笔Cookie"

  # 通用请求头
  headers:
    priority: "u=1, i"
    accept: "application/json, text/plain, */*"
    accept-language: "zh-CN,zh;q=0.9,en;q=0.8,en-GB;q=0.7,en-US;q=0.6,zh-TW;q=0.5"
    origin: "https://spa.fenbi.com"
    referer: "https://spa.fenbi.com/"
    sec-ch-ua: '"Microsoft Edge";v="149", "Chromium";v="149", "Not)A;Brand";v="24"'
    sec-ch-ua-mobile: "?0"
    sec-ch-ua-platform: '"Windows"'
    sec-fetch-dest: "empty"
    sec-fetch-mode: "cors"
    sec-fetch-site: "same-site"
    user-agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/149.0.0.0 Safari/537.36 Edg/149.0.0.0"

  # API 基础 URL
  api_base: "https://tiku.fenbi.com/combine"

  # 接口路由参数
  routecs: "xingce"
  kav: 125
  av: 127
  hav: 125
  app: "web"
  apcid: 0
  deviceId: ""
  gav: 2

  # static/solution 需要的 type 参数
  solution_type: 1

# 大模型调用（DeepSeek，已通过 Claude Code 环境变量注入，这里仅作占位）
llm:
  model: "deepseek-chat"  # deepseek-chat (V3) 或 deepseek-v4-pro (推理增强)
  base_url: "https://api.deepseek.com"
  api_key: "你的DeepSeek API Key"